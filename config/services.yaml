# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.mailer_from: '%env(APP_MAILER_FROM)%'
    app.short_name: '%env(APP_SHORT_NAME)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    Scheb\TwoFactorBundle\Controller\FormController: '@scheb_two_factor.form_controller'
    Scheb\TwoFactorBundle\Security\TwoFactor\Provider\Email\Generator\CodeGenerator: '@scheb_two_factor.security.email.default_code_generator'

    App\Service\Viisp\ViispTicket:
        arguments:
            $pid: '%env(VIISP_PID)%'
            $viispAuthUrl: '%env(VIISP_AUTH_URL)%'

    App\Service\Viisp\ViispIdentity:
        arguments:
            $pid: '%env(VIISP_PID)%'
            $viispAuthUrl: '%env(VIISP_AUTH_URL)%'

    App\Service\Viisp\ViispHttpClient:
        arguments:
            $viispSoapEndpointUrl: '%env(VIISP_SOAP_ENDPOINT_URL)%'
            $viispSoapActionBaseUrl: '%env(VIISP_SOAP_ACTION_BASE_URL)%'
            $viispAuthUrl: '%env(VIISP_AUTH_URL)%'

    App\Service\Viisp\ViispClient:
        arguments:
            $privateKey: '%env(resolve:VIISP_PRIVATE_KEY)%'
            $privateKeyNew: '%env(resolve:VIISP_PRIVATE_KEY_NEW)%'

    App\Service\Viisp\ViispClientInterface: '@App\Service\Viisp\ViispClient'

    App\Controller\ViispAuthController:
        arguments:
            $viispSoapActionBaseUrl: '%env(VIISP_SOAP_ACTION_BASE_URL)%'
