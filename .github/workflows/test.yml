name: Test

on:
    push:

    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:17
                ports:
                    - 5432:5432
                env:
                    POSTGRES_USER: sf-test
                    POSTGRES_PASSWORD: sf-test
                    POSTGRES_DB: sf-test
                options: >-
                    --health-cmd "pg_isready -U sf-test"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
            localstack:
                image: localstack/localstack:4.11.0
                ports:
                    - 4566:4566
                env:
                    SERVICES: s3
                    S3_ENDPOINT_STRATEGY: path
        env:
            DATABASE_URL: postgresql://sf-test:sf-test@localhost:5432/sf?serverVersion=17&charset=utf8
            APP_ENV: test
            AWS_ENDPOINT_URL: http://localhost:4566
            AWS_S3_BUCKET: dev
            AWS_DEFAULT_REGION: us-east-1
            AWS_ACCESS_KEY_ID: test
            AWS_SECRET_ACCESS_KEY: test
        steps:
            -   uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'

            -   name: Install dependencies
                run: composer install
                env:
                    APP_ENV: dev

            -   name: Run PHPStan check
                run: ./phpstan/check-project.sh

            -   name: Run Rector check
                run: ./vendor/bin/rector process --dry-run

            -   name: Wait for PostgreSQL to be ready
                run: |
                    for i in {1..10}; do
                      pg_isready -h localhost -p 5432 -U postgres && break || sleep 2
                    done

            -   name: Create database schema
                run: php bin/console doctrine:schema:create

            -   name: Generate JWT keys
                run: php bin/console lexik:jwt:generate-keypair

            -   name: Build Tailwind CSS
                run: php bin/console tailwind:build

            -   name: Wait for LocalStack and create S3 bucket
                run: |
                    for i in {1..30}; do
                      aws --endpoint-url=http://localhost:4566 s3 ls >/dev/null 2>&1 && break || sleep 2
                    done
                    aws --endpoint-url=http://localhost:4566 s3 mb s3://dev || true

            -   name: Run Behat tests
                run: vendor/bin/behat --colors
